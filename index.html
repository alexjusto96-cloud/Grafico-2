<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Gráfico rendimiento</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://www.gstatic.com/charts/loader.js"></script>

  <style>
    :root {
      --bg-page: #f5f7fb;
      --bg-card: #ffffff;
      --text-main: #111827;
      --text-muted: #6b7280;
      --grid: #e5e7eb;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg-page);
      color: var(--text-main);
      display: flex;
      justify-content: center;
    }

    .wrapper {
      width: 100%;
      max-width: 1000px;
      padding: 16px;
      box-sizing: border-box;
    }

    .card {
      background: var(--bg-card);
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
      padding: 16px 16px 8px 16px;
    }

    h1, h2 {
      margin: 0;
      text-align: center;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
    }

    h2 {
      font-size: 1rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-top: 4px;
      margin-bottom: 8px;
    }

    #chart {
      width: 100%;
      height: 70vh;
      min-height: 320px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #chart_inner {
      width: 100%;
      height: 100%;
    }

    @media (max-width: 600px) {
      h1 { font-size: 1.3rem; }
      h2 { font-size: 0.9rem; }
      #chart { height: 65vh; }
    }
  </style>
</head>

<body>
  <div class="wrapper">
    <div class="card">

      <h1>Evolución del rendimiento</h1>
      <h2 id="subtitulo"></h2>

      <div id="chart">
        <div id="chart_inner"></div>
      </div>

    </div>
  </div>

<script>

google.charts.load('current', { packages: ['corechart'] });
google.charts.setOnLoadCallback(init);

async function init() {

  const url = "https://script.google.com/macros/s/AKfycbxMfiseKw7Fh810OIbEPnGrNZa-ZviQ7XYUifrdrk7lxfHdjODFPRzw0QmLehMKnicI/exec";

  const r = await fetch(url);
  const json = await r.json();

  const header = json.header;
  const data   = json.data;
  const subtitulo = json.subtitulo || "";
  const ejeY1 = json.ejeY;
  const ejeY2 = json.ejeY2;

  document.getElementById("subtitulo").innerText = subtitulo;

  if (!data || data.length === 0) {
    document.getElementById("chart_inner").innerText = "Sin datos";
    return;
  }

  const dt = new google.visualization.DataTable();

  dt.addColumn('date', header[0]);
  dt.addColumn('number', header[1]); // Performance
  dt.addColumn('number', header[2]); // Context

  const rows = data.map(row => {

    const p = row[0].split("/");

    return [
      new Date(p[0], p[1]-1, p[2]),
      row[1],
      row[2]
    ];

  });

  dt.addRows(rows);


  // rangos independientes
  const y1vals = rows.map(r => r[1]).filter(v => v != null);
  const y2vals = rows.map(r => r[2]).filter(v => v != null);

  const y1min = Math.min(...y1vals);
  const y1max = Math.max(...y1vals);

  const y2min = Math.min(...y2vals);
  const y2max = Math.max(...y2vals);

  const options = {

    backgroundColor: 'transparent',

    legend: {
      position: "bottom"
    },

    chartArea: {
      left: 70,
      right: 70,
      top: 30,
      bottom: 60
    },

    hAxis: {
      title: header[0],
      format: 'yyyy/MM/dd',
      gridlines: { color: '#e5e7eb' }
    },

    vAxes: {

  0: {
    title: ejeY1,
    viewWindow: {
      min: y1min - (y1max - y1min) * 0.1,
      max: y1max + (y1max - y1min) * 0.1
    }
  },

  1: {
    title: ejeY2,
    viewWindow: {
      min: y2min - (y2max - y2min) * 0.1,
      max: y2max + (y2max - y2min) * 0.1
    },
        gridlines: { color: 'transparent' }
      }

    },


    // SERIES
    series: {

      // Performance
      0: {
        targetAxisIndex: 0,
        color: '#2563eb',
        pointSize: 7,
        lineWidth: 0
      },

      // Context
      1: {
        targetAxisIndex: 1,
        color: '#ef4444',
        pointSize: 7,
        lineWidth: 0
      }

    },


    // tendencia SOLO performance
    trendlines: {

      0: {
        type: 'linear',
        color: '#2563eb',
        lineWidth: 2,
        opacity: 0.8,
        visibleInLegend: false
      }

    },

    tooltip: {
      trigger: 'both'
    }

  };


  const chart =
    new google.visualization.ScatterChart(
      document.getElementById("chart_inner")
    );

  chart.draw(dt, options);

}

</script>

</body>
</html>

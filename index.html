<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Gráfico rendimiento</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://www.gstatic.com/charts/loader.js"></script>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7fb;
      display: flex;
      justify-content: center;
      color: #111827;
    }

    .wrapper {
      width: 100%;
      max-width: 1000px;
      padding: 16px;
      box-sizing: border-box;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
      padding: 16px 16px 8px 16px;
    }

    h1, h2 {
      margin: 0;
      text-align: center;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
    }

    h2 {
      font-size: 1rem;
      font-weight: 500;
      color: #6b7280;
      margin-top: 4px;
      margin-bottom: 8px;
    }

    #chart {
      width: 100%;
      height: 70vh;
      min-height: 320px;
    }

    @media (max-width: 600px) {
      h1 { font-size: 1.3rem; }
      h2 { font-size: 0.9rem; }
      #chart { height: 65vh; }
    }
  </style>
</head>

<body>
  <div class="wrapper">
    <div class="card">
      <h1>Evolución del rendimiento</h1>
      <h2 id="subtitulo"></h2>
      <div id="chart"></div>
    </div>
  </div>

  <script>
    google.charts.load('current', { packages: ['corechart'] });
    google.charts.setOnLoadCallback(init);

    async function init() {
      const baseUrl =
        "https://script.google.com/macros/s/AKfycbyCLpz6MLU4jdtMQyvl-U6BDRdEizV5E2cR7a65X2KMFwSlqMk1jvclGJSKEVATRVI/exec";

      // rompe caché
      const url = baseUrl + (baseUrl.includes("?") ? "&" : "?") + "t=" + Date.now();

      const r = await fetch(url, { cache: "no-store" });
      const json = await r.json();

      const header = Array.isArray(json.header) ? json.header : [];
      const data   = Array.isArray(json.data) ? json.data : [];

      document.getElementById("subtitulo").innerText = json.subtitulo || "";

      if (!data.length) {
        document.getElementById("chart").innerText = "Sin datos.";
        return;
      }

      if (!Array.isArray(data[0]) || data[0].length < 3) {
        document.getElementById("chart").innerText =
          "El endpoint no está devolviendo 3 columnas [fecha, y1, y2].";
        return;
      }

      // Nombres de ejes (sin debug)
      const ejeY1 = json.ejeY  || header[1] || "Performance";
      const ejeY2 = json.ejeY2 || header[2] || "Context";

      // Punto de color para títulos (●)
      const BLUE_DOT = " \u25CF";
      const RED_DOT  = " \u25CF";

      const dt = new google.visualization.DataTable();
      dt.addColumn('date', header[0] || "Fecha");
      dt.addColumn('number', header[1] || "Performance");
      dt.addColumn('number', header[2] || "Context");

      const rows = data.map(row => {
        const p = String(row[0]).split("/"); // "yyyy/MM/dd"
        const d = new Date(Number(p[0]), Number(p[1]) - 1, Number(p[2]));

        const y1p = parseFloat(String(row[1]).replace(",", "."));
        const y2p = parseFloat(String(row[2]).replace(",", "."));

        return [
          d,
          Number.isFinite(y1p) ? y1p : null,
          Number.isFinite(y2p) ? y2p : null
        ];
      });

      dt.addRows(rows);

      // rangos por eje
      const y1vals = rows.map(r => r[1]).filter(v => Number.isFinite(v));
      const y2vals = rows.map(r => r[2]).filter(v => Number.isFinite(v));

      const y1min = Math.min(...y1vals);
      const y1max = Math.max(...y1vals);
      const y2min = Math.min(...y2vals);
      const y2max = Math.max(...y2vals);

      // margen 10%
      const y1range = y1max - y1min;
      const y2range = y2max - y2min;

      const y1margin = y1range !== 0 ? y1range * 0.1 : (Math.abs(y1max) || 1) * 0.1;
      const y2margin = y2range !== 0 ? y2range * 0.1 : (Math.abs(y2max) || 1) * 0.1;

      const options = {
        backgroundColor: 'transparent',

        // ✅ quitar leyenda inferior
        legend: { position: "none" },

        chartArea: { left: 80, right: 80, top: 30, bottom: 60 },

        hAxis: {
          title: header[0] || "Fecha",
          format: 'yyyy/MM/dd',
          gridlines: { color: '#e5e7eb', count: 5 },
          slantedText: false
        },

        vAxes: {
          0: {
            // ✅ texto + punto azul
            title: ejeY1 + BLUE_DOT,
            viewWindow: { min: y1min - y1margin, max: y1max + y1margin },
            gridlines: { color: '#e5e7eb' },
            baselineColor: '#d1d5db',
            titleTextStyle: { color: '#2563eb', italic: false }
          },
          1: {
            // ✅ texto + punto rojo
            title: ejeY2 + RED_DOT,
            viewWindow: { min: y2min - y2margin, max: y2max + y2margin },
            gridlines: { color: 'transparent' },
            baselineColor: 'transparent',
            titleTextStyle: { color: '#ef4444', italic: false }
          }
        },

        seriesType: 'scatter',

        series: {
          // Performance: puntos azules
          0: { targetAxisIndex: 0, color: '#2563eb', pointSize: 7 },
          // Context: puntos rojos
          1: { targetAxisIndex: 1, color: '#ef4444', pointSize: 7 }
        },

        // ✅ Trendline SOLO para Performance (serie 0)
        trendlines: {
          0: { type: 'linear', color: '#2563eb', lineWidth: 2, opacity: 0.85, visibleInLegend: false }
        },

        tooltip: { trigger: 'both' }
      };

      const chart = new google.visualization.ComboChart(document.getElementById("chart"));
      chart.draw(dt, options);
    }
  </script>
</body>
</html>

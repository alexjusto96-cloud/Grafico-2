<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Gráfico rendimiento</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://www.gstatic.com/charts/loader.js"></script>

  <style>
    :root {
      --bg-page: #f5f7fb;
      --bg-card: #ffffff;
      --text-main: #111827;
      --text-muted: #6b7280;
      --accent: #2563eb;
      --trend: #ef4444;
      --grid: #e5e7eb;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg-page);
      color: var(--text-main);
      display: flex;
      justify-content: center;
    }

    .wrapper {
      width: 100%;
      max-width: 1000px;
      padding: 16px;
      box-sizing: border-box;
    }

    .card {
      background: var(--bg-card);
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
      padding: 16px 16px 8px 16px;
    }

    h1, h2 {
      margin: 0;
      text-align: center;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
    }

    h2 {
      font-size: 1rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-top: 4px;
      margin-bottom: 8px;
    }

    /* 📌 CONTENEDOR centrado del gráfico */
    #chart {
      width: 100%;
      height: 70vh;
      min-height: 320px;

      display: flex;
      justify-content: center;   /* centrado horizontal */
      align-items: center;       /* centrado vertical */
    }

    /* 📌 El gráfico real se pinta AQUÍ dentro */
    #chart_inner {
      width: 100%;
      height: 100%;
    }

    @media (max-width: 600px) {
      h1 { font-size: 1.3rem; }
      h2 { font-size: 0.9rem; }
      #chart { height: 65vh; }
    }
  </style>
</head>

<body>
  <div class="wrapper">
    <div class="card">
      <h1 id="titulo">Evolución del rendimiento</h1>
      <h2 id="subtitulo"></h2>

      <!-- CONTENEDOR centrador -->
      <div id="chart">
        <!-- Aquí dentro se dibuja el gráfico -->
        <div id="chart_inner"></div>
      </div>

    </div>
  </div>

  <script>
    google.charts.load('current', { packages: ['corechart'] });
    google.charts.setOnLoadCallback(init);

    async function init() {
      const url = "https://script.google.com/macros/s/AKfycbxMfiseKw7Fh810OIbEPnGrNZa-ZviQ7XYUifrdrk7lxfHdjODFPRzw0QmLehMKnicI/exec";

      const r = await fetch(url);
      const json = await r.json();

      // ✅ Esperamos ahora: header = ["Fecha","Serie 1","Serie 2"]
      const header = json.header || ["Fecha", "Serie 1", "Serie 2"];
      const data   = json.data || [];
      const subtitulo = json.subtitulo || "";
      const ejeY1 = json.ejeY  || header[1];
      const ejeY2 = json.ejeY2 || header[2];

      document.getElementById("subtitulo").innerText = subtitulo;

      if (!data || data.length === 0) {
        document.getElementById('chart_inner').innerText = "Sin datos.";
        return;
      }

      const dt = new google.visualization.DataTable();
      dt.addColumn('date', header[0]);
      dt.addColumn('number', header[1]); // eje izq
      dt.addColumn('number', header[2]); // eje der

      const rows = data.map(row => {
        const p = String(row[0]).split("/"); // "yyyy/MM/dd"
        const d = new Date(Number(p[0]), Number(p[1]) - 1, Number(p[2]));
        const y1 = (row[1] == null || row[1] === "") ? null : Number(String(row[1]).replace(",", "."));
        const y2 = (row[2] == null || row[2] === "") ? null : Number(String(row[2]).replace(",", "."));
        return [d, y1, y2];
      });

      dt.addRows(rows);

      // Rangos separados (para que cada eje escale con su serie)
      const y1vals = rows.map(r => r[1]).filter(v => v != null && !Number.isNaN(v));
      const y2vals = rows.map(r => r[2]).filter(v => v != null && !Number.isNaN(v));

      const y1min = y1vals.length ? Math.min(...y1vals) : 0;
      const y1max = y1vals.length ? Math.max(...y1vals) : 1;
      const y1margin = (y1max - y1min) * 0.1 || 1;

      const y2min = y2vals.length ? Math.min(...y2vals) : 0;
      const y2max = y2vals.length ? Math.max(...y2vals) : 1;
      const y2margin = (y2max - y2min) * 0.1 || 1;

      const options = {
        title: "",
        backgroundColor: 'transparent',
        legend: { position: "bottom" },

        chartArea: {
          left: 70,
          right: 70,  // ✅ espacio para el eje derecho
          top: 30,
          bottom: 60
        },

        hAxis: {
          title: header[0],
          format: 'yyyy/MM/dd',
          textStyle: { fontSize: 11, color: '#4b5563' },
          titleTextStyle: { fontSize: 12, italic: false, color: '#374151' },
          gridlines: { color: '#e5e7eb', count: 5 },
          slantedText: false
        },

        // ✅ Dos ejes verticales
        vAxes: {
          0: {
            title: ejeY1,
            viewWindow: { min: y1min - y1margin, max: y1max + y1margin },
            textStyle: { fontSize: 11, color: '#4b5563' },
            titleTextStyle: { fontSize: 12, italic: false, color: '#374151' },
            gridlines: { color: '#e5e7eb' },
            baselineColor: '#d1d5db'
          },
          1: {
            title: ejeY2,
            viewWindow: { min: y2min - y2margin, max: y2max + y2margin },
            textStyle: { fontSize: 11, color: '#4b5563' },
            titleTextStyle: { fontSize: 12, italic: false, color: '#374151' },
            gridlines: { color: 'transparent' }, // evita rejilla duplicada
            baselineColor: '#d1d5db'
          }
        },

        // ✅ Solo puntos rojos, sin trendline
        series: {
          0: { targetAxisIndex: 0, color: '#ef4444', pointSize: 6, lineWidth: 0 },
          1: { targetAxisIndex: 1, color: '#ef4444', pointSize: 6, lineWidth: 0 }
        },

        // ✅ Quita las líneas de tendencia
        trendlines: {},

        tooltip: { trigger: 'both' }
      };

      const chart = new google.visualization.ScatterChart(
        document.getElementById("chart_inner")
      );

      chart.draw(dt, options);
    }
  </script>
</body>
</html>

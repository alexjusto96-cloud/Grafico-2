<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Gráfico rendimiento</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://www.gstatic.com/charts/loader.js"></script>

  <style>

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      background: #f5f7fb;
      display: flex;
      justify-content: center;
    }

    .wrapper {
      width: 100%;
      max-width: 1000px;
      padding: 16px;
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      padding: 16px;
    }

    h1,h2 {
      text-align: center;
      margin: 0;
    }

    h2 {
      color: #6b7280;
      margin-top: 4px;
      margin-bottom: 10px;
    }

    #chart {
      height: 70vh;
      min-height: 320px;
    }

  </style>
</head>

<body>

<div class="wrapper">

<div class="card">

<h1>Evolución del rendimiento</h1>

<h2 id="subtitulo"></h2>

<div id="chart"></div>

</div>

</div>

<script>

google.charts.load('current',{packages:['corechart']});
google.charts.setOnLoadCallback(init);

async function init(){

const url =
"https://script.google.com/macros/s/AKfycbxMfiseKw7Fh810OIbEPnGrNZa-ZviQ7XYUifrdrk7lxfHdjODFPRzw0QmLehMKnicI/exec";

const r = await fetch(url);

const json = await r.json();

const header = json.header;
const data   = json.data;

document.getElementById("subtitulo").innerText =
json.subtitulo || "";


const dt = new google.visualization.DataTable();

dt.addColumn('date', header[0]);
dt.addColumn('number', header[1]); // Performance
dt.addColumn('number', header[2]); // Context


const rows = data.map(row=>{

const p = row[0].split("/");

return [

new Date(p[0],p[1]-1,p[2]),

Number(row[1]),

Number(row[2])

];

});


dt.addRows(rows);


// ============================
// calcular rangos seguros
// ============================

const y1vals =
rows.map(r=>r[1]).filter(v=>!isNaN(v));

const y2vals =
rows.map(r=>r[2]).filter(v=>!isNaN(v));


const y1min = Math.min(...y1vals);
const y1max = Math.max(...y1vals);

const y2min = Math.min(...y2vals);
const y2max = Math.max(...y2vals);


const y1margin =
Math.max((y1max-y1min)*0.1,1);

const y2margin =
Math.max((y2max-y2min)*0.1,1);


// ============================
// opciones gráfico
// ============================

const options = {

backgroundColor:'transparent',

legend:{position:'bottom'},

chartArea:{
left:70,
right:70,
top:30,
bottom:60
},

hAxis:{
title:header[0],
format:'yyyy/MM/dd',
gridlines:{color:'#e5e7eb'}
},

vAxes:{

0:{
title:header[1],
viewWindow:{
min:y1min-y1margin,
max:y1max+y1margin
}
},

1:{
title:header[2],
viewWindow:{
min:y2min-y2margin,
max:y2max+y2margin
},
gridlines:{color:'transparent'}
}

},


// series

series:{

0:{
targetAxisIndex:0,
color:'#2563eb',
pointSize:7,
lineWidth:0
},

1:{
targetAxisIndex:1,
color:'#ef4444',
pointSize:7,
lineWidth:0
}

},


// trendline solo performance

trendlines:{

0:{
type:'linear',
color:'#2563eb',
lineWidth:2,
opacity:0.8,
visibleInLegend:false
}

},

tooltip:{trigger:'both'}

};


// ============================
// dibujar
// ============================

const chart =
new google.visualization.ScatterChart(
document.getElementById("chart")
);

chart.draw(dt,options);

}

</script>

</body>
</html>

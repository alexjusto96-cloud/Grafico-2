<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Gráfico Rendimiento</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://www.gstatic.com/charts/loader.js"></script>
  <style>
    body { margin: 0; font-family: sans-serif; background: #f5f7fb; display: flex; justify-content: center; }
    .wrapper { width: 100%; max-width: 1000px; padding: 16px; }
    .card { background: #fff; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); padding: 20px; }
    h1, h2 { text-align: center; margin: 0; }
    h2 { color: #6b7280; font-size: 1rem; margin-bottom: 10px; }
    #chart { width: 100%; height: 70vh; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="card">
      <h1 id="titulo">Evolución del rendimiento</h1>
      <h2 id="subtitulo"></h2>
      <div id="chart"></div>
    </div>
  </div>

  <script>
    google.charts.load('current', { packages: ['corechart'] });
    google.charts.setOnLoadCallback(init);

    async function init() {
      const url = "https://script.google.com/macros/s/AKfycbxMfiseKw7Fh810OIbEPnGrNZa-ZviQ7XYUifrdrk7lxfHdjODFPRzw0QmLehMKnicI/exec";
      const r = await fetch(url);
      const json = await r.json();

      const header = json.header || ["Fecha","Performance","Context"];
      const data = json.data || [];
      document.getElementById("subtitulo").innerText = json.subtitulo || "";

      const dt = new google.visualization.DataTable();
      dt.addColumn('date', 'Fecha');
      dt.addColumn('number', json.ejeY || header[1]);
      dt.addColumn('number', json.ejeY2 || header[2]);

      const rows = data.map(row => {
        const p = row[0].split("/");
        return [
          new Date(p[0], p[1]-1, p[2]),
          parseFloat(String(row[1]).replace(",", ".")),
          parseFloat(String(row[2]).replace(",", "."))
        ];
      });
      dt.addRows(rows);

      // --- CÁLCULO DE LÍMITES ESTRICTOS ---
      const y1Vals = rows.map(r => r[1]);
      const y2Vals = rows.map(r => r[2]);
      
      const min1 = Math.min(...y1Vals);
      const max1 = Math.max(...y1Vals);
      const min2 = Math.min(...y2Vals);
      const max2 = Math.max(...y2Vals);

      const options = {
        chartArea: { left: 80, right: 80, width: '80%', height: '70%' },
        series: {
          0: { targetAxisIndex: 0, color: '#2563eb', pointSize: 6 },
          1: { targetAxisIndex: 1, color: '#ef4444', pointSize: 6, type: 'scatter' }
        },
        vAxes: {
          0: { 
            title: json.ejeY || header[1],
            viewWindow: { min: min1 - 5, max: max1 + 5 },
            textStyle: { color: '#2563eb' }
          },
          1: { 
            title: json.ejeY2 || header[2],
            viewWindow: { min: min2 - 2, max: max2 + 2 },
            gridlines: { color: 'transparent' },
            textStyle: { color: '#ef4444' }
          }
        },
        hAxis: { format: 'yyyy/MM/dd', gridlines: { count: 5 } },
        trendlines: { 0: { type: 'linear', color: '#2563eb', opacity: 0.3 } },
        legend: { position: 'bottom' }
      };

      const chart = new google.visualization.ComboChart(document.getElementById("chart"));
      chart.draw(dt, options);
    }
  </script>
</body>
</html>
